name: Java Build & Test

# Triggers
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # allows manual run

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Build project
      - name: Build with Maven
        working-directory: RestAssuredAPITesting
        run: mvn clean install

      # 5. Run tests
      - name: Run Tests
        working-directory: RestAssuredAPITesting
        run: mvn test

      # 6. Upload test reports (optional)
      - name: Upload Test Reports
        if: always()  # even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: RestAssuredAPITesting/target/surefire-reports/
